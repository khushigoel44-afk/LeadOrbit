<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadOrbit SaaS Register Screen (Bootstrap 5)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 py-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="text-primary fw-bold mb-0">LeadOrbit</h2>
                            <p class="text-muted">Create your account to get started.</p>
                        </div>

                        <form>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="firstName" class="form-label text-muted small fw-semibold">First
                                        Name</label>
                                    <input type="text" class="form-control form-control-lg fs-6" id="firstName"
                                        placeholder="Jane" required>
                                </div>
                                <div class="col-6">
                                    <label for="lastName" class="form-label text-muted small fw-semibold">Last
                                        Name</label>
                                    <input type="text" class="form-control form-control-lg fs-6" id="lastName"
                                        placeholder="Doe" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="emailAddress" class="form-label text-muted small fw-semibold">Email
                                    Address</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="emailAddress"
                                    placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted small fw-semibold">Password</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="password"
                                    placeholder="Min. 8 characters" required>
                            </div>

                            <div class="d-grid mb-3">
                                <button class="btn btn-primary btn-lg" type="submit">Sign Up</button>
                            </div>
                        </form>

                        <div class="text-center">
                            <p class="mb-0 text-muted">Already have an account? <a href="/login.html"
                                    class="text-primary text-decoration-none fw-semibold">Sign in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script type="module">
        import { register } from '/api.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const first_name = document.getElementById('firstName').value;
                    const last_name = document.getElementById('lastName').value;
                    const email = document.getElementById('emailAddress').value;
                    const password = document.getElementById('password').value;

                    const organization_name = first_name + "'s Organization";

                    try {
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing up...';

                        await register({
                            first_name, last_name, email, password, organization_name
                        });

                        window.location.href = '/dashboard.html';
                    } catch (err) {
                        alert('Registration failed. Please try again.');
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = false;
                        btn.textContent = 'Sign Up';
                    }
                });
            }
        });
    </script>
</body>

</html>

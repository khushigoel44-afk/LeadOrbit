<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/theme-boot.js"></script>
    <title>LeadOrbit SaaS Login Screen (Bootstrap 5)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/theme.css" rel="stylesheet">
</head>

<body class="auth-page d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card auth-card border-0 shadow-sm p-4">
                    <div class="card-body">
                        <div class="mb-3">
    <a href="/" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-2">
        <span>&larr;</span>
        <span>Back to Home</span>
    </a>
</div>
                        <div class="text-center mb-4">
                            <h2 class="text-primary fw-bold mb-0">LeadOrbit</h2>
                            <p class="text-muted">Welcome back! Please enter your details.</p>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label for="floatingInput" class="form-label text-muted small fw-semibold">Email
                                    Address</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="floatingInput"
                                    placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="floatingPassword"
                                    class="form-label text-muted small fw-semibold">Password</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="floatingPassword"
                                    placeholder="Password" required>
                            </div>

                            <div class="d-grid mb-3">
                                <button class="btn btn-primary btn-lg" type="submit">Sign In</button>
                            </div>
                        </form>

                        <div class="text-center">
                            <p class="mb-0 text-muted">Don't have an account? <a href="/register.html"
                                    class="text-primary text-decoration-none fw-semibold">Create one</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script type="module">
        import { login } from '/api.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('floatingInput').value;
                    const password = document.getElementById('floatingPassword').value;
                    try {
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = true;
                        btn.textContent = 'Signing In...';
                        await login(email, password);
                        window.location.href = '/dashboard.html';
                    } catch (err) {
                        alert('Login failed. Please check your credentials.');
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = false;
                        btn.textContent = 'Sign In';
                    }
                });
            }
        });
    </script>
</body>

</html>
